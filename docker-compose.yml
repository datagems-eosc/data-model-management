services:
  grafeo:
    image: grafeo/grafeo-server:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - grafeo_data:/data

  api:
    build: .
    ports:
      - "5050:5000"
    environment:
      GRAFEO_URL: http://grafeo:7474
    depends_on:
      - grafeo

volumes:
  grafeo_data:
