(:Basic_DL_Element => {
    id :: STRING NOT NULL, 
    date :: OFFSET DATETIME, 
    combinedSimilarity :: FLOAT, 
    usesMetrics :: STRING
}),

CONSTRAINT basicdlelement_pk 
FOR (n:BasicDLElement) REQUIRE (n.id) IS KEY 

(:Property_Comparison => {
    id :: STRING NOT NULL,  
    targetProperty :: STRING,
    metricValue :: FLOAT, 
    usesMetrics :: STRING, 
    relevantWords :: LIST<STRING> 
}),

CONSTRAINT propertycomparison_pk 
FOR (n:PropertyComparison) REQUIRE (n.id) IS KEY 

(:Text_Evidence => {
    id :: STRING NOT NULL,  
    similarity :: FLOAT
})

CONSTRAINT textevidence_pk 
FOR (n:TextEvidence) REQUIRE (n.id) IS KEY 

(:Basic_DL_Element)-[:has_comparison { weight :: FLOAT }]->(:Property_Comparison)

(:Property_Comparison)-[:has_evidence { rank :: UINT64 }]->(:Text_Evidence)

(:Text_Evidence)-[:has_target { chunk :: STRING }]->(:sc_Dataset)

(:Property_Comparison)-[:has_target { chunk :: STRING }]->(:sc_Dataset)
