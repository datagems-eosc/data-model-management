# Nodes
(BasicDLElementType: BasicDLElement { REQUIRED combinedSimilarity FLOAT , REQUIRED usesMetrics STRING, REQUIRED date DATE})

(PropertyComparisonType: PropertyComparison { REQUIRED metricValue FLOAT , REQUIRED targetProperty STRING, REQUIRED usesMetrics STRING, OPTIONAL relevantWords LIST })

(TextEvidenceType: TextEvidence {REQUIRED rank INT, REQUIRED similarity FLOAT, REQUIRED usesMetrics STRING })

# Edges

(:BasicDLElement) -[hasComparisonType: hasComparison {REQUIRED weight FLOAT }] -> (:PropertyComparison)

(:PropertyComparison) -[hasEvidenceType: hasEvidence {REQUIRED rank FLOAT }] -> (:TextEvidence)

(:TextEvidence | :PropertyComparison) -[:hasTargetDatasetType :hasTargetDataset {OPTIONAL chunk STRING, OPTIONAL uniqueKeywords LIST}] -> (:sc_Dataset)
